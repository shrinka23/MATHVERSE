name: mathverse
description: A fun math game for kids with animations and levels
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  fl_chart: ^0.63.0
  flutter_animate: ^4.2.0
  audioplayers: ^6.8.1
  confetti: ^0.7.0
  animations: ^2.0.7
  flutter_staggered_animations: ^1.1.1
  just_audio: ^0.9.34

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/